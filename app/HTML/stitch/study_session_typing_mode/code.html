<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Study Session - Typing Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#0053db",
                    "surface": "#f8f9fb",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#996100",
                    "on-background": "#191c1e",
                    "tertiary-fixed": "#ffddb8",
                    "primary-fixed-dim": "#b4c5ff",
                    "primary": "#004ac6",
                    "outline-variant": "#c3c6d7",
                    "on-surface-variant": "#434655",
                    "inverse-primary": "#b4c5ff",
                    "on-tertiary-fixed-variant": "#653e00",
                    "tertiary": "#784b00",
                    "secondary-fixed": "#6ffbbe",
                    "primary-fixed": "#dbe1ff",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-error-container": "#93000a",
                    "surface-container-highest": "#e1e2e4",
                    "secondary-container": "#6cf8bb",
                    "on-surface": "#191c1e",
                    "on-secondary-container": "#00714d",

                    "error": "#ba1a1a",

                    "inverse-on-surface": "#f0f1f3",
                    "inverse-surface": "#2e3132",
                    "surface-container": "#edeef0",
                    "primary-container": "#2563eb",
                    "background": "#f8f9fb",
                    "error-container": "#ffdad6",
                    "surface-variant": "#e1e2e4",
                    "surface-dim": "#d9dadc",
                    "secondary": "#006c49",
                    "on-error": "#ffffff",
                    "secondary-fixed-dim": "#4edea3",
                    "on-tertiary-fixed": "#2a1700",
                    "surface-bright": "#f8f9fb"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "16px",
                    "margin": "24px",
                    "lg": "24px",
                    "gutter": "16px",
                    "xs": "4px",
                    "xl": "40px",
                    "base": "8px",
                    "sm": "12px"
            },
            "fontFamily": {
                    "headline-md": ["Lexend", "sans-serif"],
                    "headline-lg": ["Lexend", "sans-serif"],
                    "body-md": ["Inter", "sans-serif"],
                    "body-lg": ["Inter", "sans-serif"],
                    "label-sm": ["Inter", "sans-serif"],
                    "headline-xl": ["Lexend", "sans-serif"],
                    "label-md": ["Inter", "sans-serif"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "1.25", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-xl": ["40px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "500"}]
            }
          }
        }
      }

<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="bg-surface font-body-md text-body-md text-on-surface min-h-screen flex overflow-hidden">
<!-- SideNavBar (from JSON) -->
<aside class="bg-white dark:bg-gray-900 h-screen w-64 fixed left-0 top-0 border-r border-gray-200 dark:border-gray-800 shadow-[4px_0_10px_rgba(0,0,0,0.05)] flex flex-col p-6 gap-8 z-50">
<div class="flex flex-col gap-1">
<h1 class="text-2xl font-black text-blue-600 dark:text-blue-400 tracking-tight">FlashMind</h1>
<span class="font-label-sm text-label-sm text-on-surface-variant">Master Your Learning</span>
</div>
<nav class="flex flex-col gap-2 flex-1">
<!-- Dashboard -->
<a class="flex items-center gap-3 p-3 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-blue-600 transition-colors font-lexend text-sm font-medium active:scale-95 transition-transform duration-200" href="#">
<span class="material-symbols-outlined">dashboard</span>
                Dashboard
            </a>
<!-- My Decks -->
<a class="flex items-center gap-3 p-3 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-blue-600 transition-colors font-lexend text-sm font-medium active:scale-95 transition-transform duration-200" href="#">
<span class="material-symbols-outlined">layers</span>
                My Decks
            </a>
<!-- Study Session (ACTIVE) -->
<a class="flex items-center gap-3 p-3 rounded-lg text-blue-600 dark:text-blue-400 font-bold border-r-4 border-blue-600 bg-blue-50/50 dark:bg-blue-900/20 font-lexend text-sm font-medium active:scale-95 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">school</span>
                Study Session
            </a>
<!-- Statistics -->
<a class="flex items-center gap-3 p-3 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-blue-600 transition-colors font-lexend text-sm font-medium active:scale-95 transition-transform duration-200" href="#">
<span class="material-symbols-outlined">bar_chart</span>
                Statistics
            </a>
</nav>
<button class="mt-auto w-full py-3 px-4 bg-primary text-on-primary rounded font-label-md text-label-md font-medium shadow-[0_4px_10px_rgba(0,0,0,0.05)] border-b-2 border-on-primary-fixed-variant active:translate-y-[2px] active:border-b-0 transition-all">
            Create New Deck
        </button>
</aside>
<!-- Main Content Wrapper -->
<div class="flex-1 flex flex-col ml-64 h-screen bg-surface">
<!-- TopAppBar (from JSON) -->
<header class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md sticky top-0 z-40 w-full border-b border-gray-200 dark:border-gray-800 flex justify-between items-center px-8 py-3">
<div class="flex items-center">
<div class="relative focus-within:ring-2 focus-within:ring-blue-500/20 rounded-full">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[20px]">search</span>
<input class="pl-10 pr-4 py-2 bg-gray-100 dark:bg-gray-800 rounded-full text-sm outline-none border-transparent focus:bg-white dark:focus:bg-gray-900 transition-colors w-64 text-gray-500 dark:text-gray-400" placeholder="Search..." type="text"/>
</div>
</div>
<div class="flex items-center gap-4">
<button class="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 p-2 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 p-2 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined">help_outline</span>
</button>
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-variant border border-outline-variant">
<img alt="User profile" class="w-full h-full object-cover" data-alt="close up portrait of a young professional smiling softly in warm studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAp67MR7fIPFzA5uobCkPrN6UCOJdh5XrH2IbGanYwWeFHMtGEk4GGEnw2KSHch7cKJwKViMEFyMQabaoKhT55_fzPTqQPpp2MYOEZySqVcz23rjbOuBrIWevFEQihdCJDRW3chHS4PWKNQ35PKKiuDGnYYGVZZy70vfkQ80MDZ9a3YoBY975mbyptNrqcEWlV7vdaSHkTNbxErbkMHb2U--ZHQaTU31tG94OFUW46O98gMcpi7aRaDWIqKy9ShUeRk6A80VUIVhInz"/>
</div>
</div>
</header>
<!-- Focused Study Canvas -->
<main class="flex-1 overflow-y-auto p-6 lg:p-margin flex flex-col items-center justify-center relative">
<!-- Fixed Width Container (max 640px) as per guidelines -->
<div class="w-full max-w-[640px] flex flex-col gap-xl">
<!-- Progress Header -->
<div class="flex flex-col gap-base w-full">
<div class="flex justify-between items-end w-full font-label-md text-label-md text-on-surface-variant">
<span>Current Deck Progress</span>
<span class="font-bold text-primary">15 / 50</span>
</div>
<!-- Thick 8px track progress bar -->
<div class="w-full h-base bg-primary-fixed-dim rounded-full overflow-hidden">
<div class="h-full w-[30%] bg-gradient-to-r from-primary to-secondary rounded-full transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Central Flashcard (Level 1 Elevation) -->
<div class="bg-surface-container-lowest rounded-[24px] p-xl shadow-[0_4px_10px_rgba(0,0,0,0.05)] border border-surface-variant min-h-[280px] flex flex-col items-center justify-center text-center relative group">
<span class="absolute top-md left-md bg-primary-fixed text-on-primary-fixed-variant font-label-sm text-label-sm px-3 py-1 rounded">Front side</span>
<h2 class="font-headline-lg text-headline-lg text-on-surface mt-sm max-w-[90%] leading-tight">
                        Define: Spaced Repetition
                    </h2>
</div>
<!-- Typing Input Area -->
<div class="flex flex-col gap-sm w-full bg-surface-container-lowest p-lg rounded-xl shadow-[0_4px_10px_rgba(0,0,0,0.02)] border border-surface-variant">
<label class="font-label-md text-label-md text-on-surface-variant" for="answer-input">Your Answer</label>
<textarea class="w-full bg-surface border border-outline-variant rounded p-md font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:border-primary focus:ring-[3px] focus:ring-primary/20 transition-all outline-none resize-none" id="answer-input" placeholder="Type your explanation here..." rows="4"></textarea>
<div class="flex justify-between items-center mt-md">
<button class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">lightbulb</span>
                            Show Hint
                        </button>
<button class="bg-primary text-on-primary font-label-md text-label-md py-sm px-lg rounded shadow-[0_4px_10px_rgba(0,0,0,0.1)] border-b-2 border-on-primary-fixed-variant hover:bg-surface-tint transition-colors active:translate-y-[2px] active:border-b-0 flex items-center gap-2">
                            Check Answer
                            <span class="material-symbols-outlined text-[18px]">keyboard_return</span>
</button>
</div>
</div>
</div>
</main>
</div>
</body></html>
